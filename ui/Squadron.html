<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>squadron</title>
<meta name="viewport" content="width=1440" />
<link rel="icon" type="image/svg+xml" href="squadron-logo.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="squadron-logo-32.png" />
<link rel="icon" type="image/png" sizes="256x256" href="squadron-logo-256.png" />
<link rel="apple-touch-icon" href="squadron-logo-256.png" />
<link rel="stylesheet" href="tokens.css?v=20260503-redesign-18" />

<!-- No analytics, no telemetry, no phone-home. Squadron is local-first; install
     counts (if needed) come from npm: api.npmjs.org/downloads/point/last-week/@m-luketin/squadron -->

<style>
  html, body, #root { height: 100%; margin: 0; }
  body {
    background: var(--sb-bg);
    color: var(--sb-fg);
    font-family: var(--sb-font-body);
    overflow: hidden;
    font-size: 13px;
  }
  * { box-sizing: border-box; }

  /* ---------- chrome ---------- */
  .app {
    display: grid;
    grid-template-rows: 44px 1fr;
    /* center uses minmax(0, 1fr) so its min-width is 0 — otherwise an overflowing
       tab strip would inflate the column and push the right sidebar offscreen. */
    grid-template-columns: 280px minmax(0, 1fr) 320px;
    grid-template-areas:
      "topbar topbar topbar"
      "left   center right";
    height: 100vh;
    width: 100vw;
  }
  .topbar {
    grid-area: topbar;
    border-bottom: 1px solid var(--sb-line);
    display: flex; align-items: center;
    padding: 0 12px 0 16px;
    gap: 14px;
    background: var(--sb-bg);
    user-select: none;
  }
  .left   { grid-area: left;   border-right: 1px solid var(--sb-line); display: flex; flex-direction: column; min-height: 0; background: var(--sb-bg); }
  .center { grid-area: center; display: flex; flex-direction: column; min-height: 0; min-width: 0; background: var(--sb-bg); }
  .right  { grid-area: right;  border-left: 1px solid var(--sb-line); display: flex; flex-direction: column; min-height: 0; background: var(--sb-bg); }

  /* common bits */
  .mono { font-family: var(--sb-font-mono); }
  .marker { font-family: var(--sb-font-mono); color: var(--sb-fg-faint); font-size: 11px; letter-spacing: 0.04em; }
  .eyebrow {
    font-family: var(--sb-font-mono);
    color: var(--sb-fg-faint);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .hairline { border-bottom: 1px solid var(--sb-line); }
  .hairline-soft { border-bottom: 1px solid var(--sb-line-soft); }

  button { font-family: inherit; color: inherit; }
  button:focus-visible { outline: 1px solid var(--sb-accent); outline-offset: 2px; }

  /* ---------- topbar ---------- */
  .brand {
    font-family: var(--sb-font-display);
    font-weight: 600;
    letter-spacing: -0.02em;
    font-size: 15px;
    display: flex; align-items: center; gap: 8px;
  }
  .brand .dot {
    width: 8px; height: 8px; border-radius: 999px;
    background: var(--sb-accent);
    box-shadow: 0 0 12px var(--sb-accent-glow);
  }
  .topbar .sep { width: 1px; height: 18px; background: var(--sb-line); }
  .tb-btn {
    border: 1px solid var(--sb-line);
    background: transparent;
    color: var(--sb-fg-muted);
    font-size: 11.5px;
    height: 26px;
    padding: 0 10px;
    border-radius: var(--sb-r-sm);
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer;
    transition: color var(--sb-dur-fast) var(--sb-ease), border-color var(--sb-dur-fast) var(--sb-ease), background var(--sb-dur-fast) var(--sb-ease);
  }
  .tb-btn:hover { color: var(--sb-fg); border-color: rgba(255,255,255,0.18); background: var(--sb-surface); }
  .tb-btn.active { color: var(--sb-fg); border-color: var(--sb-accent); background: var(--sb-accent-wash); }
  .tb-icon { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

  .killswitch {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--sb-line);
    height: 28px; padding: 0 10px 0 8px;
    border-radius: var(--sb-r-sm);
    background: transparent;
    cursor: pointer;
    color: var(--sb-fg-muted);
    font-size: 11.5px;
    transition: all var(--sb-dur-fast) var(--sb-ease);
  }
  .killswitch .pip {
    width: 8px; height: 8px; border-radius: 999px;
    background: #2a8c4a;
    box-shadow: 0 0 8px rgba(42,140,74,0.5);
  }
  .killswitch.killed { color: var(--sb-fg); border-color: var(--sb-accent); background: var(--sb-accent-wash); }
  .killswitch.killed .pip { background: var(--sb-accent); box-shadow: 0 0 12px var(--sb-accent-glow); animation: blink 1.2s infinite; }
  @keyframes blink { 50% { opacity: 0.45; } }

  /* ---------- tabs ---------- */
  .tabs {
    display: flex; align-items: stretch;
    height: 36px;
    border-bottom: 1px solid var(--sb-line);
    background: var(--sb-bg);
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
  }
  .tabs::-webkit-scrollbar { height: 6px; }
  .tabs::-webkit-scrollbar-thumb { background: var(--sb-line); border-radius: 3px; }
  .tabs::-webkit-scrollbar-track { background: transparent; }
  .tab {
    display: flex; align-items: center; gap: 8px;
    padding: 0 14px;
    border-right: 1px solid var(--sb-line);
    color: var(--sb-fg-muted);
    font-size: 12px;
    cursor: pointer;
    background: transparent;
    border-top: none; border-left: none; border-bottom: none;
    height: 100%;
    white-space: nowrap;
    position: relative;
    flex-shrink: 0;
    transition: color var(--sb-dur-fast) var(--sb-ease);
  }
  .tab.dragging { opacity: 0.4; }
  /* Drop indicator: 2px accent bar on the leading/trailing edge with a soft red glow.
     Inset top/bottom 4px so the bar reads as a marker, not a full edge fill. */
  .tab.drop-before { box-shadow: inset 2px 0 0 var(--sb-accent), inset 2px 0 8px rgba(217,59,37,0.6); }
  .tab.drop-after  { box-shadow: inset -2px 0 0 var(--sb-accent), inset -2px 0 8px rgba(217,59,37,0.6); }
  .tab.pinned::before {
    content: '📌';
    font-size: 9px;
    margin-right: 4px;
  }
  .tab.grid-tab {
    padding: 0 16px;
    background: linear-gradient(180deg, rgba(217,59,37,0.08) 0%, transparent 100%);
    color: var(--sb-fg);
    border-right: 1px solid var(--sb-line);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .tab.grid-tab.active {
    background: linear-gradient(180deg, rgba(217,59,37,0.18) 0%, var(--sb-bg-elev) 100%);
  }
  .tab.grid-tab::before {
    content: '';
    width: 4px; height: 18px; margin-right: 8px;
    background: var(--sb-accent);
    border-radius: 2px;
    display: inline-block;
  }
  .tab:hover { color: var(--sb-fg); background: rgba(255,255,255,0.02); }
  /* Active tab: brighter background lift, thicker top accent bar, full-strength
     bottom underline. Designed to read clearly even in the middle of a long row. */
  .tab.active {
    color: var(--sb-fg);
    background: var(--sb-bg-elev);
  }
  .tab.active::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px;
    background: var(--sb-accent);
    box-shadow: 0 0 6px rgba(217,59,37,0.5);
  }
  .tab .badge {
    font-family: var(--sb-font-mono);
    font-size: 9.5px;
    letter-spacing: 0.05em;
    padding: 1px 5px;
    border: 1px solid var(--sb-line);
    border-radius: 3px;
    color: var(--sb-fg-faint);
  }
  .tab .close {
    width: 14px; height: 14px; border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--sb-fg-faint);
    border: none; background: transparent; cursor: pointer;
  }
  .tab .close:hover { color: var(--sb-fg); background: var(--sb-surface-2); }

  /* ---------- canvas ---------- */
  .canvas-wrap { flex: 1; position: relative; overflow: hidden; }
  .canvas-wrap .grid-bg {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);
    background-size: 22px 22px;
    pointer-events: none;
  }
  .canvas-wrap .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
  }

  /* status bar */
  .canvas-status {
    position: absolute; left: 12px; bottom: 12px;
    display: flex; gap: 8px; align-items: center;
    flex-wrap: wrap; max-width: calc(100% - 220px);
    font-family: var(--sb-font-mono); font-size: 10.5px;
    color: var(--sb-fg-faint);
    letter-spacing: 0.04em;
    pointer-events: none;
  }
  .canvas-status .chip {
    border: 1px solid var(--sb-line);
    padding: 4px 8px; border-radius: 3px;
    background: rgba(10,10,10,0.7);
    backdrop-filter: blur(6px);
  }

  /* zoom controls */
  .zoom-ctl {
    position: absolute; right: 12px; bottom: 12px;
    display: flex; flex-direction: column;
    border: 1px solid var(--sb-line);
    border-radius: var(--sb-r-sm);
    overflow: hidden;
    background: rgba(10,10,10,0.8);
    backdrop-filter: blur(6px);
  }
  .zoom-ctl button {
    width: 28px; height: 28px;
    border: none; background: transparent;
    color: var(--sb-fg-muted);
    cursor: pointer;
    border-bottom: 1px solid var(--sb-line);
    transition: color var(--sb-dur-fast), background var(--sb-dur-fast);
  }
  .zoom-ctl button:last-child { border-bottom: none; }
  .zoom-ctl button:hover { color: var(--sb-fg); background: var(--sb-surface); }

  /* ---------- minimap ---------- */
  .minimap {
    position: absolute; right: 52px; bottom: 12px;
    width: 180px; height: 130px;
    border: 1px solid var(--sb-line);
    background: rgba(10,10,10,0.7);
    backdrop-filter: blur(8px);
    border-radius: var(--sb-r-sm);
    overflow: hidden;
  }
  .minimap .mm-head {
    height: 22px; border-bottom: 1px solid var(--sb-line-soft);
    display: flex; align-items: center; padding: 0 8px;
    font-family: var(--sb-font-mono); font-size: 9.5px;
    color: var(--sb-fg-faint); letter-spacing: 0.06em;
    justify-content: space-between;
  }
  .minimap .mm-body { position: relative; height: calc(100% - 22px); }

  /* mode bar */
  .modebar {
    position: absolute; left: 50%; top: 12px; transform: translateX(-50%);
    display: flex; gap: 2px;
    background: rgba(10,10,10,0.85); backdrop-filter: blur(8px);
    border: 1px solid var(--sb-line); border-radius: var(--sb-r-sm);
    padding: 4px;
  }
  .modebar button {
    height: 26px; padding: 0 9px;
    background: transparent;
    border: none;
    color: var(--sb-fg-muted);
    font-size: 11.5px;
    border-radius: 3px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    letter-spacing: 0.02em;
    transition: all var(--sb-dur-fast) var(--sb-ease);
  }
  .modebar button:hover { color: var(--sb-fg); background: var(--sb-surface); }
  .modebar button.active { color: var(--sb-fg); background: var(--sb-accent); }
  .modebar button.active.wall { background: rgba(255,255,255,0.15); color: var(--sb-fg); }
  .modebar button.active.erase { background: rgba(255,255,255,0.08); color: var(--sb-fg); }
  .modebar .kbd {
    font-family: var(--sb-font-mono); font-size: 9.5px;
    color: var(--sb-fg-disabled);
    border: 1px solid var(--sb-line);
    padding: 1px 4px; border-radius: 2px;
  }

  /* ---------- left sidebar ---------- */
  .left-head {
    height: 36px;
    display: flex; align-items: center; padding: 0 14px;
    border-bottom: 1px solid var(--sb-line);
    justify-content: space-between;
  }
  .left-head h3 {
    margin: 0; font-family: var(--sb-font-mono);
    font-size: 10.5px; letter-spacing: 0.1em;
    color: var(--sb-fg-faint); text-transform: uppercase; font-weight: 500;
  }
  .left-filters {
    display: flex; gap: 4px; padding: 8px 10px;
    border-bottom: 1px solid var(--sb-line-soft);
  }
  .filter-chip {
    border: 1px solid var(--sb-line);
    background: transparent;
    color: var(--sb-fg-muted);
    font-size: 10.5px;
    height: 22px; padding: 0 8px;
    border-radius: 3px;
    cursor: pointer;
    font-family: var(--sb-font-mono);
    letter-spacing: 0.04em;
    transition: all var(--sb-dur-fast);
  }
  .filter-chip.on { color: var(--sb-fg); border-color: rgba(255,255,255,0.25); background: var(--sb-surface); }
  .filter-chip:hover { color: var(--sb-fg); }

  .conv-list { flex: 1; overflow-y: auto; }
  .conv-section-head {
    padding: 12px 14px 6px;
    font-family: var(--sb-font-mono);
    font-size: 9.5px; letter-spacing: 0.1em;
    color: var(--sb-fg-disabled);
    text-transform: uppercase;
  }
  .conv-row {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    gap: 10px; align-items: center;
    padding: 9px 14px;
    border-bottom: 1px solid var(--sb-line-faint);
    cursor: pointer;
    transition: background var(--sb-dur-fast) var(--sb-ease);
    position: relative;
  }
  .conv-row:hover { background: var(--sb-surface); }
  .conv-row.focused { background: var(--sb-surface-2); }
  .conv-row.focused::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    background: var(--sb-accent);
  }
  .avatar {
    width: 32px; height: 32px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: rgba(0,0,0,0.85);
    font-family: var(--sb-font-display); font-weight: 600;
    flex-shrink: 0;
    position: relative;
  }
  .avatar.dual {
    background: transparent;
    border: 1px solid var(--sb-line);
    border-radius: 6px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .avatar.dual > span {
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }
  .conv-name { font-size: 12.5px; color: var(--sb-fg); display: flex; align-items: center; gap: 6px; }
  .conv-preview { font-size: 11px; color: var(--sb-fg-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .conv-time { font-family: var(--sb-font-mono); font-size: 9.5px; color: var(--sb-fg-disabled); letter-spacing: 0.04em; }
  .status-dot { width: 6px; height: 6px; border-radius: 999px; }
  .status-dot.live { background: #2a8c4a; box-shadow: 0 0 6px rgba(42,140,74,0.6); }
  .status-dot.live.pulsing { animation: livepulse 1.6s infinite; }
  @keyframes livepulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(42,140,74,0.6); }
    50%      { box-shadow: 0 0 0 6px rgba(42,140,74,0); }
  }
  .status-dot.archived { background: var(--sb-fg-disabled); }
  .status-dot.unread { background: var(--sb-accent); box-shadow: 0 0 6px var(--sb-accent-glow); }

  /* ---------- chat view ---------- */
  .chat-head {
    height: 44px;
    display: flex; align-items: center; gap: 10px;
    padding: 0 12px;
    border-bottom: 1px solid var(--sb-line);
  }
  .chat-back {
    width: 24px; height: 24px;
    border-radius: 4px; border: 1px solid var(--sb-line);
    background: transparent; color: var(--sb-fg-muted);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .chat-back:hover { color: var(--sb-fg); background: var(--sb-surface); }
  .chat-title { font-size: 12.5px; color: var(--sb-fg); }
  .chat-sub { margin-left: auto; font-family: var(--sb-font-mono); font-size: 10px; color: var(--sb-fg-faint); letter-spacing: 0.04em; }

  .chat-body { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 88%; }
  .msg.you { align-self: flex-end; }
  .msg .who {
    font-family: var(--sb-font-mono); font-size: 9.5px; letter-spacing: 0.06em;
    color: var(--sb-fg-faint); text-transform: uppercase;
  }
  .msg .bubble {
    border: 1px solid var(--sb-line);
    background: var(--sb-surface);
    color: var(--sb-fg);
    padding: 9px 11px;
    border-radius: 8px;
    font-size: 12.5px;
    line-height: 1.5;
  }
  .msg.you .bubble { border-color: rgba(217,59,37,0.45); background: rgba(217,59,37,0.06); }
  .msg.system .bubble {
    font-family: var(--sb-font-mono); font-size: 11px; color: var(--sb-fg-faint);
    background: transparent; border-style: dashed;
  }

  .composer {
    border-top: 1px solid var(--sb-line);
    padding: 10px 12px;
    display: flex; gap: 8px; align-items: flex-end;
  }
  .composer textarea {
    flex: 1;
    background: var(--sb-surface);
    border: 1px solid var(--sb-line);
    color: var(--sb-fg);
    border-radius: 6px;
    padding: 9px 10px;
    font: inherit;
    font-size: 12.5px;
    resize: none;
    min-height: 36px; max-height: 120px;
    outline: none;
  }
  .composer textarea:focus { border-color: rgba(255,255,255,0.25); }
  .composer .send {
    background: var(--sb-accent-deep);
    border: 1px solid var(--sb-accent);
    color: white; padding: 8px 14px;
    border-radius: 6px; font-size: 12px;
    cursor: pointer;
    transition: background var(--sb-dur-fast);
  }
  .composer .send:hover { background: var(--sb-accent); }

  /* ---------- right sidebar ---------- */
  .panel-head {
    height: 36px;
    display: flex; align-items: center; padding: 0 14px;
    border-bottom: 1px solid var(--sb-line);
    justify-content: space-between;
  }
  .panel-head h3 {
    margin: 0; font-family: var(--sb-font-mono);
    font-size: 10.5px; letter-spacing: 0.1em;
    color: var(--sb-fg-faint); text-transform: uppercase; font-weight: 500;
  }
  .panel-body { padding: 0; overflow: hidden; display: flex; flex-direction: column; flex: 1; min-height: 0; }
  .panel-body-scroll { padding: 14px; overflow-y: auto; flex: 1; min-height: 0; }
  .panel-body-sticky { padding: 14px; border-top: 1px solid var(--sb-line); background: var(--sb-bg); flex-shrink: 0; }

  .draft-banner, .live-banner {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; margin-bottom: 14px;
    border: 1px solid var(--sb-line);
    border-radius: 4px;
    font-family: var(--sb-font-mono); font-size: 10.5px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .draft-banner { color: var(--sb-fg-muted); border-style: dashed; }
  .live-banner { color: #2a8c4a; border-color: rgba(42,140,74,0.4); background: rgba(42,140,74,0.05); }

  .agent-id {
    display: flex; gap: 12px; align-items: center; margin-bottom: 16px;
  }
  .agent-id .av {
    width: 48px; height: 48px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    color: rgba(0,0,0,0.85);
  }
  .agent-id .name { font-family: var(--sb-font-display); font-size: 18px; letter-spacing: -0.01em; }
  .agent-id .pos { font-family: var(--sb-font-mono); font-size: 10.5px; color: var(--sb-fg-faint); margin-top: 2px; }

  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-family: var(--sb-font-mono);
    font-size: 9.5px; letter-spacing: 0.1em;
    color: var(--sb-fg-faint); text-transform: uppercase;
    margin-bottom: 5px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--sb-surface);
    border: 1px solid var(--sb-line);
    color: var(--sb-fg);
    border-radius: 4px;
    padding: 7px 9px;
    font: inherit;
    font-size: 12px;
    outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: rgba(255,255,255,0.25); }
  .field textarea { resize: vertical; min-height: 64px; font-family: var(--sb-font-mono); font-size: 11px; line-height: 1.55; }

  .telemetry { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--sb-line); border: 1px solid var(--sb-line); border-radius: 4px; overflow: hidden; margin-bottom: 16px; }
  .telemetry .cell { background: var(--sb-bg); padding: 8px 10px; }
  .telemetry .lbl { font-family: var(--sb-font-mono); font-size: 9px; letter-spacing: 0.08em; color: var(--sb-fg-faint); text-transform: uppercase; }
  .telemetry .val { font-family: var(--sb-font-mono); font-size: 12px; color: var(--sb-fg); margin-top: 2px; }

  .panel-divider { height: 1px; background: var(--sb-line); margin: 16px -14px; }

  /* memory graph */
  .memory-graph { height: 200px; position: relative; border: 1px solid var(--sb-line); border-radius: 6px; background: rgba(0,0,0,0.3); overflow: hidden; }
  .memory-graph svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .mg-node { fill: var(--sb-bg-elev); stroke: rgba(255,255,255,0.25); stroke-width: 1; cursor: pointer; transition: fill 200ms, stroke 200ms; }
  .mg-node:hover { fill: var(--sb-accent-wash); stroke: var(--sb-accent); }
  .mg-edge { stroke: rgba(255,255,255,0.1); stroke-width: 1; }
  .mg-label { font-family: var(--sb-font-mono); font-size: 9px; fill: var(--sb-fg-muted); pointer-events: none; }

  /* connections */
  .conn-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid var(--sb-line-faint);
    font-size: 11.5px;
  }
  .conn-row:last-child { border-bottom: none; }
  .conn-row .ico { width: 22px; height: 22px; border-radius: 4px; border: 1px solid var(--sb-line); display: flex; align-items: center; justify-content: center; font-family: var(--sb-font-mono); font-size: 9.5px; color: var(--sb-fg-muted); }
  .conn-row .meta { font-family: var(--sb-font-mono); font-size: 9.5px; color: var(--sb-fg-faint); margin-left: auto; }
  .conn-add { display: flex; align-items: center; gap: 6px; margin-top: 8px; color: var(--sb-fg-muted); cursor: pointer; font-size: 11px; padding: 6px 0; border: 1px dashed var(--sb-line); border-radius: 4px; justify-content: center; }
  .conn-add:hover { color: var(--sb-accent); border-color: var(--sb-accent); }

  /* ---------- connection wizard modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.18s ease both;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-card {
    width: 540px; max-height: 80vh;
    background: var(--sb-bg-elev);
    border: 1px solid var(--sb-line);
    border-radius: var(--sb-r-md);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px var(--sb-line);
    display: flex; flex-direction: column;
    overflow: hidden;
    animation: modalIn 0.22s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--sb-line-soft);
  }
  .modal-head .eyebrow { font-family: var(--sb-font-mono); font-size: 10px; color: var(--sb-fg-faint); letter-spacing: 0.1em; }
  .modal-head h2 { font-family: var(--sb-font-display); font-size: 18px; margin: 2px 0 0; letter-spacing: -0.01em; font-weight: 500; }
  .modal-head .close-x {
    width: 26px; height: 26px; border-radius: 4px; border: 1px solid var(--sb-line);
    background: transparent; color: var(--sb-fg-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--sb-dur-fast);
  }
  .modal-head .close-x:hover { color: var(--sb-fg); border-color: var(--sb-fg-disabled); }

  .modal-stepper {
    display: flex; gap: 6px; padding: 12px 18px 0;
    align-items: center;
  }
  .modal-stepper .step {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--sb-font-mono); font-size: 9.5px; letter-spacing: 0.08em;
    color: var(--sb-fg-disabled); text-transform: uppercase;
  }
  .modal-stepper .step.active { color: var(--sb-fg); }
  .modal-stepper .step.done { color: var(--sb-fg-muted); }
  .modal-stepper .step .num {
    width: 18px; height: 18px; border-radius: 50%; border: 1px solid currentColor;
    display: flex; align-items: center; justify-content: center; font-size: 9px;
  }
  .modal-stepper .step.active .num { background: var(--sb-accent); color: #fff; border-color: var(--sb-accent); }
  .modal-stepper .step.done .num { background: var(--sb-fg-muted); color: var(--sb-bg); border-color: var(--sb-fg-muted); }
  .modal-stepper .arrow { color: var(--sb-fg-disabled); font-size: 10px; }

  .modal-body { padding: 16px 20px 4px; overflow-y: auto; flex: 1; }
  .modal-body p.lede { color: var(--sb-fg-muted); font-size: 12.5px; line-height: 1.55; margin: 0 0 14px; max-width: 460px; }

  .picker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .picker-card {
    border: 1px solid var(--sb-line);
    border-radius: var(--sb-r-md);
    padding: 14px;
    cursor: pointer;
    background: transparent;
    text-align: left;
    transition: border-color var(--sb-dur-fast), background var(--sb-dur-fast), transform var(--sb-dur-fast);
    color: var(--sb-fg);
    display: flex; flex-direction: column; gap: 6px;
  }
  .picker-card:hover { border-color: var(--sb-accent); background: rgba(217,59,37,0.06); }
  .picker-card.selected { border-color: var(--sb-accent); background: rgba(217,59,37,0.1); }
  .picker-card.disabled { opacity: 0.4; cursor: not-allowed; }
  .picker-card .pc-head { display: flex; align-items: center; gap: 10px; }
  .picker-card .pc-ico {
    width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--sb-line);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--sb-font-mono); font-size: 11px; color: var(--sb-fg);
    background: var(--sb-surface);
  }
  .picker-card .pc-name { font-family: var(--sb-font-display); font-size: 14px; letter-spacing: -0.01em; }
  .picker-card .pc-tag { font-family: var(--sb-font-mono); font-size: 9px; letter-spacing: 0.08em; color: var(--sb-fg-faint); margin-left: auto; text-transform: uppercase; }
  .picker-card .pc-desc { color: var(--sb-fg-muted); font-size: 11.5px; line-height: 1.4; }

  .cli-handoff {
    border: 1px solid var(--sb-line);
    border-radius: var(--sb-r-md);
    background: var(--sb-surface);
    padding: 14px 16px;
    font-family: var(--sb-font-mono); font-size: 11.5px;
    color: var(--sb-fg);
  }
  .cli-handoff .cli-line { color: var(--sb-fg-muted); display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .cli-handoff .cli-line .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--sb-fg-disabled); flex-shrink: 0; }
  .cli-handoff .cli-line.done .pip { background: #2a8c4a; }
  .cli-handoff .cli-line.active .pip {
    background: var(--sb-accent);
    box-shadow: 0 0 0 0 var(--sb-accent);
    animation: cliPulse 1.4s ease-in-out infinite;
  }
  @keyframes cliPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(217,59,37,0.5); }
    50% { box-shadow: 0 0 0 5px rgba(217,59,37,0); }
  }
  .cli-handoff .cli-line.active { color: var(--sb-fg); }

  .modal-foot {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 18px; border-top: 1px solid var(--sb-line-soft);
  }
  .modal-foot .helptext { font-family: var(--sb-font-mono); font-size: 10px; color: var(--sb-fg-disabled); letter-spacing: 0.06em; }
  .modal-foot .actions { display: flex; gap: 8px; }
  .btn-ghost, .btn-primary {
    padding: 7px 14px; border-radius: var(--sb-r-sm);
    font-size: 12px; cursor: pointer; transition: all var(--sb-dur-fast);
    border: 1px solid var(--sb-line);
    background: transparent; color: var(--sb-fg-muted);
    font-family: var(--sb-font-body);
  }
  .btn-ghost:hover { color: var(--sb-fg); border-color: var(--sb-fg-disabled); }
  .btn-primary { background: var(--sb-accent); color: #fff; border-color: var(--sb-accent); }
  .btn-primary:hover { background: var(--sb-accent-hot); border-color: var(--sb-accent-hot); }
  .btn-primary:disabled, .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }

  .field-inline {
    display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px;
  }
  .field-inline label { font-family: var(--sb-font-mono); font-size: 10px; color: var(--sb-fg-faint); letter-spacing: 0.08em; text-transform: uppercase; }
  .field-inline input {
    background: var(--sb-surface); color: var(--sb-fg);
    border: 1px solid var(--sb-line); border-radius: var(--sb-r-sm);
    padding: 9px 11px; font-size: 12.5px; font-family: var(--sb-font-mono);
    transition: border-color var(--sb-dur-fast);
  }
  .field-inline input:focus { outline: none; border-color: var(--sb-accent); }
  .field-inline .hint { font-family: var(--sb-font-mono); font-size: 9.5px; color: var(--sb-fg-disabled); letter-spacing: 0.04em; }

  .success-state {
    text-align: center; padding: 30px 20px 18px;
  }
  .success-state .check {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(42,140,74,0.15); border: 1px solid rgba(42,140,74,0.4);
    margin: 0 auto 14px; display: flex; align-items: center; justify-content: center;
    color: #2a8c4a;
    animation: checkIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }
  @keyframes checkIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .success-state h3 { font-family: var(--sb-font-display); font-size: 18px; margin: 0 0 6px; letter-spacing: -0.01em; font-weight: 500; }
  .success-state p { color: var(--sb-fg-muted); font-size: 12.5px; margin: 0 0 4px; }

  /* ---------- empty state ---------- */
  .empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px; color: var(--sb-fg-faint);
    text-align: center; padding: 24px;
  }
  .empty-state .marker-x { font-family: var(--sb-font-mono); font-size: 11px; color: var(--sb-fg-disabled); letter-spacing: 0.08em; }
  .empty-state .ttl { font-family: var(--sb-font-display); font-size: 18px; color: var(--sb-fg-muted); letter-spacing: -0.01em; max-width: 260px; line-height: 1.3; }

  /* ---------- editor tab ---------- */
  .md-editor { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--sb-bg); }
  .md-head { padding: 14px 18px; border-bottom: 1px solid var(--sb-line); display: flex; align-items: center; gap: 10px; }
  .md-body { flex: 1; padding: 22px 28px; overflow-y: auto; font-family: var(--sb-font-mono); font-size: 13px; line-height: 1.7; color: var(--sb-fg); }
  .md-body h1 { font-family: var(--sb-font-display); font-size: 24px; margin: 0 0 14px; letter-spacing: -0.02em; }
  .md-body h2 { font-family: var(--sb-font-display); font-size: 16px; margin: 22px 0 10px; color: var(--sb-fg); letter-spacing: -0.01em; }
  .md-body p { margin: 0 0 10px; color: var(--sb-fg-muted); }
  .md-body .wikilink { color: var(--sb-accent); cursor: pointer; }
  .md-body .wikilink:hover { text-decoration: underline; }
  .md-body code { color: var(--sb-fg); background: var(--sb-surface); padding: 1px 5px; border-radius: 3px; font-size: 12px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

  /* hex pulse */
  @keyframes breathe {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 0.7; }
  }
  @keyframes hexring-pulse {
    0%   { stroke-opacity: 0.8; stroke-width: 2; }
    100% { stroke-opacity: 0; stroke-width: 5; }
  }
  @keyframes spin-slow { to { transform: rotate(360deg); } }
  @keyframes bootflash {
    0%   { stroke-opacity: 1;   stroke-width: 2.5; }
    100% { stroke-opacity: 0;   stroke-width: 8; }  }
  @keyframes bubble-in {
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }

  /* Typing indicator dots — shown in chat when an agent is thinking / using tools.
     Sized + retimed per the May 2026 redesign spec. */
  .typing-dot {
    width: 5px; height: 5px; border-radius: 50%;
    display: inline-block; opacity: 0.3;
    animation: typing-bounce 1.2s infinite ease-in-out;
  }
  @keyframes typing-bounce {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30%           { opacity: 1;   transform: translateY(-2px); }
  }

  /* Working pip — agent state indicator on agent rows.
     workPulse is for tool-running (steady scale + opacity);
     workBlink is for awaiting-input (sharper, only red animation in the sidebar). */
  @keyframes workPulse {
    0%, 100% { transform: scale(1);   opacity: 1; }
    50%      { transform: scale(1.5); opacity: 0.4; }
  }
  @keyframes workBlink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  /* Right-sidebar panel swap fade (AgentConfig ↔ FilesPanel ↔ ProfileEditor). */
  @keyframes panel-fade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Chat bubbles — markdown rendering. Compact spacing so chat scrollback stays readable. */
  .bubble.md { line-height: 1.45; }
  .bubble.md > *:first-child { margin-top: 0; }
  .bubble.md > *:last-child  { margin-bottom: 0; }
  .bubble.md p { margin: 0 0 6px; }
  .bubble.md p:last-child { margin-bottom: 0; }
  .bubble.md h1,
  .bubble.md h2,
  .bubble.md h3,
  .bubble.md h4 {
    font-family: var(--sb-font-display, var(--sb-font-mono));
    font-weight: 600; letter-spacing: -0.005em;
    margin: 8px 0 4px; line-height: 1.25;
  }
  .bubble.md h1 { font-size: 1.15em; }
  .bubble.md h2 { font-size: 1.08em; }
  .bubble.md h3 { font-size: 1.02em; opacity: 0.9; }
  .bubble.md h4 { font-size: 1em; opacity: 0.85; }
  .bubble.md ul,
  .bubble.md ol { margin: 4px 0 6px; padding-left: 22px; }
  .bubble.md li { margin: 2px 0; }
  .bubble.md li > p { margin: 0; display: inline; }
  .bubble.md a {
    color: var(--sb-accent, #7fb6d9);
    text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px;
    word-break: break-word;
  }
  .bubble.md a:hover { filter: brightness(1.15); }
  .bubble.md code {
    font-family: var(--sb-font-mono);
    font-size: 0.92em;
    padding: 1px 5px; border-radius: 3px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
  }
  /* File-link code span — clickable filenames detected in agent messages.
     Color matches the file-kind accent (--sb-kind-file). */
  .bubble.md code.file-link {
    cursor: pointer;
    background: rgba(127,182,217,0.10);
    border: 1px solid rgba(127,182,217,0.35);
    border-radius: 3px;
    padding: 0 5px;
    color: var(--sb-kind-file);
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .bubble.md code.file-link::before {
    content: '↗ ';
    opacity: 0.7;
    font-size: 0.85em;
  }
  .bubble.md code.file-link:hover {
    background: rgba(127,182,217,0.18);
    border-color: rgba(127,182,217,0.55);
  }
  .bubble.md pre {
    margin: 6px 0; padding: 8px 10px; border-radius: 5px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.08);
    overflow-x: auto;
  }
  .bubble.md pre code {
    background: transparent; border: none; padding: 0;
    font-size: 0.88em; line-height: 1.5;
  }
  .bubble.md blockquote {
    margin: 6px 0; padding: 2px 10px;
    border-left: 2px solid rgba(255,255,255,0.18);
    color: var(--sb-fg-muted);
  }
  .bubble.md hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 8px 0; }
  .bubble.md strong { font-weight: 600; }
  .bubble.md em { font-style: italic; }
  .bubble.md table { border-collapse: collapse; margin: 6px 0; font-size: 0.95em; }
  .bubble.md th, .bubble.md td {
    border: 1px solid rgba(255,255,255,0.12);
    padding: 3px 8px; text-align: left;
  }
  .bubble.md img { max-width: 100%; border-radius: 4px; margin: 4px 0; }
</style>
</head>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
