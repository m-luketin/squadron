<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Squadron · May 2026 Redesign</title>
<meta name="viewport" content="width=1440" />
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  body {
    background: #050505;
    color: var(--sb-fg);
    font-family: var(--sb-font-body);
    font-size: 13px;
  }
  * { box-sizing: border-box; }

  /* ============ shared design grammar ============ */
  .mono { font-family: var(--sb-font-mono); }
  .marker {
    font-family: var(--sb-font-mono);
    color: var(--sb-fg-faint);
    font-size: 11px;
    letter-spacing: 0.04em;
  }
  .eyebrow {
    font-family: var(--sb-font-mono);
    color: var(--sb-fg-faint);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ============ annotation system on artboards ============ */
  .anno {
    position: absolute;
    font-family: var(--sb-font-mono);
    font-size: 10px;
    letter-spacing: 0.04em;
    color: #d93b25;
    pointer-events: none;
    z-index: 100;
    line-height: 1.4;
  }
  .anno .num {
    display: inline-block;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #d93b25;
    color: #fff;
    text-align: center;
    line-height: 16px;
    font-size: 9px;
    margin-right: 6px;
    vertical-align: middle;
  }
  .anno-line {
    position: absolute;
    background: #d93b25;
    pointer-events: none;
    z-index: 99;
    opacity: 0.55;
  }
  .anno-text {
    background: #050505;
    border: 1px solid rgba(217, 59, 37, 0.4);
    padding: 4px 8px;
    border-radius: 3px;
    color: #fff;
    max-width: 280px;
    line-height: 1.45;
  }

  /* ============ artboard frame appearance ============ */
  /* Each artboard hosts a slice of squadron UI; we replicate the chrome locally. */
  .frame {
    background: var(--sb-bg);
    color: var(--sb-fg);
    font-family: var(--sb-font-body);
    font-size: 13px;
    width: 100%; height: 100%;
    overflow: hidden;
    position: relative;
  }
  .frame .topbar {
    height: 44px;
    border-bottom: 1px solid var(--sb-line);
    display: flex; align-items: center;
    padding: 0 12px 0 16px;
    gap: 14px;
    user-select: none;
  }
  .brand {
    font-family: var(--sb-font-display);
    font-weight: 600;
    letter-spacing: -0.02em;
    font-size: 15px;
    display: flex; align-items: center; gap: 8px;
  }
  .brand .dot {
    width: 8px; height: 8px; border-radius: 999px;
    background: var(--sb-accent);
    box-shadow: 0 0 12px var(--sb-accent-glow);
  }
  .topbar .sep { width: 1px; height: 18px; background: var(--sb-line); }

  /* tokens diff page chrome */
  .tokens-page {
    padding: 32px 40px;
    overflow-y: auto;
    height: 100%;
    background: var(--sb-bg);
  }
  .tokens-page h1 {
    font-family: var(--sb-font-display);
    font-weight: 500;
    font-size: 32px;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
  }
  .tokens-page h2 {
    font-family: var(--sb-font-display);
    font-weight: 500;
    font-size: 18px;
    letter-spacing: -0.01em;
    margin: 28px 0 12px;
  }
  .tokens-page p { color: var(--sb-fg-muted); margin: 0 0 8px; max-width: 640px; line-height: 1.55; }

  .swatch-row {
    display: grid;
    grid-template-columns: 56px 1fr 1fr 200px;
    gap: 12px; align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid var(--sb-line-soft);
    font-size: 12px;
  }
  .swatch-row .sw {
    width: 36px; height: 36px;
    border: 1px solid var(--sb-line);
    border-radius: var(--sb-r-sm);
  }
  .swatch-row .name { font-family: var(--sb-font-mono); font-size: 12px; color: var(--sb-fg); }
  .swatch-row .val { font-family: var(--sb-font-mono); font-size: 11px; color: var(--sb-fg-faint); }
  .swatch-row .use { color: var(--sb-fg-muted); font-size: 11.5px; line-height: 1.4; }

  .new-tag {
    display: inline-block;
    font-family: var(--sb-font-mono);
    font-size: 9px; letter-spacing: 0.08em;
    color: var(--sb-accent);
    border: 1px solid rgba(217,59,37,0.4);
    padding: 1px 5px; border-radius: 2px;
    margin-left: 6px;
    text-transform: uppercase;
    vertical-align: middle;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="mock.jsx"></script>
<script type="text/babel" src="boards/tab-strip.jsx"></script>
<script type="text/babel" src="boards/right-sidebar.jsx"></script>
<script type="text/babel" src="boards/memory-graph.jsx"></script>

</html>
